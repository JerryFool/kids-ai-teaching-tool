<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI未来家长学校互动课</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="site-shell">
      <section class="home-view" id="homeView">
        <header class="home-hero">
          <div class="hero-copy">
            <p class="eyebrow">Jerry 家庭 AI 课堂</p>
            <h1>AI未来家长学校互动课</h1>
            <p class="hero-text">
              31节课网站框架已建立。先完成第5、6、7课样板，每节约30分钟，适合家长用 iPad 横屏带小学生边看边互动。
            </p>
            <div class="hero-actions">
              <button class="primary-action" data-open-lesson="5">开始第5课</button>
              <button class="secondary-action" id="scrollCatalog">查看31课目录</button>
            </div>
          </div>
          <div class="hero-visual" aria-label="孩子和家长一起学习AI">
            <svg viewBox="0 0 620 420" role="img" aria-label="家庭AI课堂插画">
              <rect x="24" y="28" width="572" height="360" rx="28" fill="#fff8e8" />
              <rect x="316" y="72" width="220" height="156" rx="20" fill="#ffffff" stroke="#21313b" stroke-width="8" />
              <path d="M358 174 L398 120 L430 174 Z" fill="#4b9f98" />
              <circle cx="460" cy="124" r="24" fill="#f3c84d" />
              <path d="M96 302 C144 236, 210 318, 276 250 S410 238, 506 292" fill="none" stroke="#3f8f88" stroke-width="14" stroke-linecap="round" />
              <circle cx="132" cy="250" r="42" fill="#f4b7a5" stroke="#21313b" stroke-width="8" />
              <path d="M98 250 Q132 284 170 248" fill="none" stroke="#21313b" stroke-width="7" stroke-linecap="round" />
              <circle cx="236" cy="258" r="38" fill="#a9c6ff" stroke="#21313b" stroke-width="8" />
              <path d="M210 256 Q236 286 270 256" fill="none" stroke="#21313b" stroke-width="7" stroke-linecap="round" />
              <rect x="82" y="102" width="160" height="86" rx="18" fill="#eaf5f2" stroke="#21313b" stroke-width="7" />
              <path d="M116 144 h88 M116 166 h58" stroke="#21313b" stroke-width="8" stroke-linecap="round" />
              <path d="M526 72 h44 M548 50 v44" stroke="#e96f51" stroke-width="10" stroke-linecap="round" />
              <circle cx="70" cy="78" r="22" fill="#f3c84d" />
              <path d="M70 42 v-24 M70 138 v-24 M34 78 H10 M130 78h-24" stroke="#f3c84d" stroke-width="8" stroke-linecap="round" />
            </svg>
          </div>
        </header>

        <section class="status-band">
          <div>
            <strong>3节样板课</strong>
            <span>第5、6、7课完整互动设计</span>
          </div>
          <div>
            <strong>31个入口</strong>
            <span>目录结构先搭好，后续逐节补齐</span>
          </div>
          <div>
            <strong>30分钟</strong>
            <span>每节课按家庭讲课节奏设计</span>
          </div>
        </section>

        <section class="catalog-section" id="catalog">
          <div class="section-heading">
            <p class="eyebrow">课程目录</p>
            <h2>31节课总览</h2>
            <p>已完成样板课可直接进入；待校准课题会在拿到 PDF 准确目录后逐节替换。</p>
          </div>
          <div class="lesson-grid" id="lessonGrid"></div>
        </section>
      </section>

      <section class="lesson-view" id="lessonView" hidden>
        <aside class="lesson-sidebar">
          <button class="back-button" id="backHome" aria-label="返回目录">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6" /></svg>
            <span>目录</span>
          </button>
          <div class="lesson-meta">
            <span id="lessonNumber">第5课</span>
            <strong id="lessonTitle">课程标题</strong>
          </div>
          <nav class="step-nav" id="stepNav" aria-label="课程步骤"></nav>
        </aside>

        <section class="lesson-stage">
          <header class="lesson-topbar">
            <div>
              <p class="eyebrow" id="lessonKicker">30分钟家庭课</p>
              <h1 id="stepTitle">步骤标题</h1>
            </div>
            <div class="timer-pill" id="stepCounter">1 / 7</div>
          </header>
          <article class="step-panel" id="stepPanel"></article>
          <footer class="lesson-controls">
            <button class="icon-button" id="prevStep" aria-label="上一步">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6" /></svg>
            </button>
            <button class="icon-button" id="nextStep" aria-label="下一步">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6-6 6" /></svg>
            </button>
          </footer>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
